<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Girly Boutique</title>

<style>
body{
font-family:Arial,sans-serif;
background:#fff5f8;
padding:20px;
}

.produits{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.produit{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.1);
text-align:center;
}

button{
background:#e91e63;
color:white;
border:none;
padding:10px 15px;
border-radius:5px;
cursor:pointer;
}

input[type=number]{
width:80px;
padding:5px;
margin:10px 0;
}

#panier{
background:white;
margin-top:30px;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.1);
}
</style>
</head>

<body>

<h1>Girly Boutique</h1>

<div class="produits">

<div class="produit">

<h3>Parfum</h3>

<p>Prix : 12000 KMF</p>

<p>
Stock :
<span id="stock0">10</span>
</p>

<p id="etat0" style="color:green;font-weight:bold;">
Disponible
</p>

<label>Quantité :</label><br>

<input
type="number"
id="qte0"
value="1"
min="1"
max="10">

<br><br>

<button onclick="ajouter(0,'Parfum',12000)">
Ajouter au panier
</button>

</div>

<div class="produit">

<h3>Crème Visage</h3>

<p>Prix : 5000 KMF</p>

<p>
Stock :
<span id="stock1">5</span>
</p>

<p id="etat1" style="color:green;font-weight:bold;">
Disponible
</p>

<label>Quantité :</label><br>

<input
type="number"
id="qte1"
value="1"
min="1"
max="5">

<br><br>

<button onclick="ajouter(1,'Crème Visage',5000)">
Ajouter au panier
</button>

</div>

<div class="produit">

<h3>Rouge à Lèvres</h3>

<p>Prix : 3500 KMF</p>

<p>
Stock :
<span id="stock2">0</span>
</p>

<p id="etat2" style="color:red;font-weight:bold;">
❌ Rupture de stock
</p>

<label>Quantité :</label><br>

<input
type="number"
id="qte2"
value="1"
min="1"
max="0">

<br><br>

<button onclick="ajouter(2,'Rouge à Lèvres',3500)">
Ajouter au panier
</button>

</div>

</div>

<div id="panier">

<h2>Mon Panier</h2>

<div id="liste"></div>

<h3 id="total">
Total : 0 KMF
</h3>

</div>

<script>

let panier=[];

let stocks=[
10,
5,
0
];

function ajouter(id,nom,prix){

let qte=parseInt(
document.getElementById("qte"+id).value
);

if(stocks[id]<=0){

alert("Produit en rupture de stock");

return;
}

if(qte>stocks[id]){

alert(
"Stock disponible : "+
stocks[id]
);

return;
}

panier.push({
nom:nom,
prix:prix,
qte:qte
});

stocks[id]-=qte;

document.getElementById(
"stock"+id
).innerHTML=stocks[id];

document.getElementById(
"qte"+id
).max=stocks[id];

if(stocks[id]<=0){

document.getElementById(
"etat"+id
).innerHTML=
"❌ Rupture de stock";

document.getElementById(
"etat"+id
).style.color="red";
}

afficher();

}

function afficher(){

let html="";
let total=0;

panier.forEach(article=>{

let sousTotal=
article.prix*
article.qte;

html+=`
<p>
${article.nom}
 x ${article.qte}
 = ${sousTotal} KMF
</p>
`;

total+=sousTotal;

});

document.getElementById(
"liste"
).innerHTML=html;

document.getElementById(
"total"
).innerHTML=
"Total : "+
total+
" KMF";

}

</script>

</body>
</html>
